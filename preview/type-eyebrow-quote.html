<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Eyebrow & citation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; display:grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .col h4 { font-family: var(--font-sans); font-size: 10.5px; letter-spacing:.22em; text-transform:uppercase; color: color-mix(in oklab, var(--foreground) 55%, transparent); margin: 0 0 10px; }
  .eyebrow { font-family: var(--font-sans); font-size: 12px; letter-spacing: .25em; text-transform: uppercase; color: color-mix(in oklab, var(--foreground) 55%, transparent); display:inline-flex; align-items:center; gap:12px; }
  .eyebrow::before { content:""; width: 36px; height: 1px; background: color-mix(in oklab, var(--foreground) 40%, transparent); }
  .section { font-family: var(--font-sans); font-size: 12px; letter-spacing: .25em; text-transform: uppercase; color: color-mix(in oklab, var(--foreground) 55%, transparent); margin-top: 10px; }
  blockquote { margin:0; font-family: var(--font-serif); font-style: italic; font-size: 19px; line-height: 1.45; color: color-mix(in oklab, var(--foreground) 85%, transparent); }
</style></head><body>
  <div class="col">
    <h4>Étiquettes & eyebrow</h4>
    <div class="eyebrow">Projet de thèse · EHESS · 2026</div>
    <div class="section">§ II — Méthodologie &amp; Terrain</div>
  </div>
  <div class="col">
    <h4>Citation sérif italique</h4>
    <blockquote>« Apprendre le métier avant d'apprendre à en parler. Plonger les mains dans la sorbetière, sentir le sucre brûler. »</blockquote>
  </div>
</body></html>
