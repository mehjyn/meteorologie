<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Trois piliers — gradients</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
  .card { position:relative; height:180px; border-radius: var(--radius-2xl); overflow:hidden; color:#fff; padding:16px 18px; display:flex; flex-direction:column; justify-content:space-between; }
  .num { font-family: var(--font-serif); font-style: italic; font-size: 13px; opacity: .7; }
  .name { font-family: var(--font-serif); font-size: 26px; line-height:1; margin:0; }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 13px; opacity:.8; margin-top: 4px;}
  .stops { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; opacity: .85; letter-spacing: .04em; }
</style></head><body>
<div class="grid">
  <div class="card gradient-ice">
    <span class="num">01 / 03</span>
    <div><h3 class="name">Technique</h3><div class="sub">Bleu acier glacé</div></div>
    <div class="stops">ice-from → ice-to&nbsp;&nbsp;·&nbsp;&nbsp;#1E3A5F → #4A90E2</div>
  </div>
  <div class="card gradient-ochre">
    <span class="num">02 / 03</span>
    <div><h3 class="name">Économie &amp; Social</h3><div class="sub">Ocre, or chaud</div></div>
    <div class="stops">ochre-from → ochre-to&nbsp;&nbsp;·&nbsp;&nbsp;#8B6914 → #D4A574</div>
  </div>
  <div class="card gradient-meta">
    <span class="num">03 / 03</span>
    <div><h3 class="name">Métaphysique</h3><div class="sub">Indigo, violet</div></div>
    <div class="stops">meta-from → meta-to&nbsp;&nbsp;·&nbsp;&nbsp;#2D1B4E → #7B3FA0</div>
  </div>
</div>
</body></html>
