<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Ombres & élévation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background: var(--background); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
  .card { background: var(--card); border:1px solid var(--border); border-radius: var(--radius-2xl); padding: 16px; height: 120px; display:flex; flex-direction:column; justify-content:space-between;}
  .rest { box-shadow: 0 1px 0 oklch(1 0 0 / .6) inset; }
  .hover { box-shadow: 0 25px 50px -12px oklch(0 0 0 / .25); border-color: transparent; transform: translateY(-4px); }
  .inner { box-shadow: inset 0 2px 4px oklch(0 0 0 / .06);}
  .tag { font-family: var(--font-sans); font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase; color: color-mix(in oklab, var(--foreground) 55%, transparent);}
  .name { font-family: var(--font-serif); font-size: 18px; line-height: 1.1; }
  .code { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: color-mix(in oklab, var(--foreground) 55%, transparent);}
</style></head><body>
  <div class="row">
    <div class="card rest"><span class="tag">au repos</span><div><div class="name">Filet lumineux</div><div class="code">inset 0 1px 0 oklch(1 0 0 / .6)</div></div></div>
    <div class="card hover"><span class="tag">au hover</span><div><div class="name">Soulèvement</div><div class="code">shadow-2xl · −y 8px</div></div></div>
    <div class="card inner"><span class="tag">inner</span><div><div class="name">Gravé</div><div class="code">inset 0 2px 4px / .06</div></div></div>
  </div>
</body></html>
