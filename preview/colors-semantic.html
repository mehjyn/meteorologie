<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Rôles sémantiques</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .tile { border-radius: var(--radius-xl); border:1px solid var(--border); padding:14px 14px 12px; height: 104px; display:flex; flex-direction:column; justify-content:space-between; }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing:.22em; text-transform:uppercase; }
  .demo { font-family: var(--font-serif); font-size: 22px; line-height: 1; }
</style></head><body>
<div class="grid">
  <div class="tile" style="background:var(--background); color:var(--foreground)"><span class="label">background / fg</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--card); color:var(--card-foreground)"><span class="label">card / fg</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--primary); color:var(--primary-foreground)"><span class="label">primary</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--secondary); color:var(--secondary-foreground)"><span class="label">secondary</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--muted); color:var(--muted-foreground)"><span class="label">muted</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--accent); color:var(--accent-foreground)"><span class="label">accent</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--popover); color:var(--popover-foreground); box-shadow: 0 4px 18px oklch(0 0 0 / .08)"><span class="label">popover</span><span class="demo">Aa</span></div>
  <div class="tile" style="background:var(--destructive); color:var(--destructive-foreground)"><span class="label">destructive</span><span class="demo">Aa</span></div>
</div>
</body></html>
