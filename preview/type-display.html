<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Display — Playfair</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px 24px; }
  .display { font-family: var(--font-serif); font-weight: 500; font-size: 78px; line-height: .95; letter-spacing: -.01em; margin: 0; }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 20px; color: color-mix(in oklab, var(--foreground) 55%, transparent); margin-top: 6px; }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: color-mix(in oklab, var(--foreground) 55%, transparent); margin: 0 0 10px; display:flex; gap:10px; align-items:center;}
  .rule { flex:1; height:1px; background: color-mix(in oklab, var(--foreground) 40%, transparent); max-width: 50px;}
</style></head><body>
  <p class="meta"><span class="rule"></span> Display · Playfair Display Medium · 78px</p>
  <h1 class="display">Météorologie du goût</h1>
  <div class="sub">— une anthropologie de la glace, du froid et du bonheur</div>
</body></html>
