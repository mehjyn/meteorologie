  <style>
/* =====================================================================
   Météorologie du goût — Design System
   Base Type & Color Tokens
   ---------------------------------------------------------------------
   "Terre & terrain" : beige chaleureux, chocolat profond, trois gradients
   de pilier révélés au hover (glace, ocre, métaphysique).
   Toutes les couleurs sont définies en OKLCH pour la cohérence perceptuelle.
   Source: src/styles.css of field-to-frost-folio.
   ===================================================================== */

@import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap");

:root {
  /* -------- Font families -------- */
  --font-serif: "Playfair Display", ui-serif, Georgia, serif;
  --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

  /* =====================================================================
     PALETTE — "Terre & terrain"
     ===================================================================== */

  /* Fondations : beige chaleureux & chocolat profond */
  --background: oklch(0.953 0.018 85);   /* #F5F0E6  beige papier */
  --foreground: oklch(0.27 0.045 45);    /* #3D2314  chocolat profond */
  --cream: oklch(0.98 0.01 90);          /* presque blanc crémeux */
  --ink: oklch(0.27 0.045 45);           /* même que foreground */
  --earth: oklch(0.953 0.018 85);
  --earth-deep: oklch(0.78 0.04 70);     /* terre cuite atténuée */

  /* Surfaces & UI */
  --card: oklch(0.965 0.014 85);
  --card-foreground: oklch(0.27 0.045 45);
  --popover: oklch(0.97 0.012 85);
  --popover-foreground: oklch(0.27 0.045 45);

  --primary: oklch(0.27 0.045 45);
  --primary-foreground: oklch(0.97 0.014 85);
  --secondary: oklch(0.91 0.022 80);
  --secondary-foreground: oklch(0.27 0.045 45);
  --muted: oklch(0.92 0.018 80);
  --muted-foreground: oklch(0.45 0.035 50);
  --accent: oklch(0.88 0.03 75);
  --accent-foreground: oklch(0.27 0.045 45);

  --destructive: oklch(0.577 0.245 27.325);
  --destructive-foreground: oklch(0.984 0.003 247.858);

  --border: oklch(0.85 0.025 75);
  --input: oklch(0.88 0.025 75);
  --ring: oklch(0.55 0.05 50);

  /* =====================================================================
     LES TROIS PILIERS — gradients signature
     Chaque pilier correspond à une "entrée dans la matière glace".
     ===================================================================== */

  /* I · Technique — bleu acier glacé */
  --ice-from: oklch(0.32 0.08 250);      /* #1E3A5F */
  --ice-to:   oklch(0.65 0.16 245);      /* #4A90E2 */

  /* II · Économie & Social — ocre / or chaud */
  --ochre-from: oklch(0.5 0.12 80);      /* #8B6914 */
  --ochre-to:   oklch(0.78 0.1 75);      /* #D4A574 */

  /* III · Métaphysique & Sensoriel — indigo / violet */
  --meta-from: oklch(0.28 0.1 295);      /* #2D1B4E */
  --meta-to:   oklch(0.5 0.2 305);       /* #7B3FA0 */

  /* =====================================================================
     RAYONS & RADIUS
     ===================================================================== */
  --radius: 0.5rem;
  --radius-sm: calc(var(--radius) - 4px); /* 4px  */
  --radius-md: calc(var(--radius) - 2px); /* 6px  */
  --radius-lg: var(--radius);             /* 8px  */
  --radius-xl: calc(var(--radius) + 4px); /* 12px */
  --radius-2xl: calc(var(--radius) + 8px);/* 16px */
  --radius-3xl: calc(var(--radius) + 12px);/* 20px */

  /* =====================================================================
     TYPOGRAPHIE — échelle sémantique
     Serif Playfair Display pour les titres et citations ;
     Sans Inter pour texte courant et UI.
     Figures "lnum" (chiffres anciens) sur les titres.
     ===================================================================== */

  /* Display — Hero (clamp) */
  --fs-display: clamp(2.75rem, 9vw, 7.5rem);
  --lh-display: 0.95;
  --ls-display: -0.01em;

  /* Section H2 */
  --fs-h2: clamp(2.25rem, 5vw, 3.75rem);   /* ~36–60px */
  --lh-h2: 1.05;

  /* Sub-h3 (carte, terrain) */
  --fs-h3: clamp(1.5rem, 2.4vw, 2rem);
  --lh-h3: 1.15;

  /* Baseline copy */
  --fs-body: 1rem;                         /* 16px */
  --fs-body-lg: 1.0625rem;                 /* 17px */
  --lh-body: 1.7;

  /* Petites capitales / étiquettes */
  --fs-eyebrow: 0.75rem;                   /* 12px */
  --tracking-eyebrow: 0.25em;

  /* Citation sérif italique */
  --fs-quote: clamp(1.25rem, 1.8vw, 1.5rem);
  --lh-quote: 1.45;

  /* =====================================================================
     TRANSITIONS — rythme "cinéma"
     ===================================================================== */
  --ease-silk: cubic-bezier(0.22, 1, 0.36, 1);   /* ease-out "silk" signature */
  --dur-short: 300ms;
  --dur-mid: 500ms;
  --dur-long: 700ms;
  --dur-xl: 900ms;
}

/* =====================================================================
   DARK MODE — "nuit en atelier"
   ===================================================================== */
.dark {
  --background: oklch(0.18 0.025 45);
  --foreground: oklch(0.95 0.018 85);
  --card: oklch(0.22 0.03 45);
  --card-foreground: oklch(0.95 0.018 85);
  --popover: oklch(0.22 0.03 45);
  --popover-foreground: oklch(0.95 0.018 85);
  --primary: oklch(0.95 0.018 85);
  --primary-foreground: oklch(0.27 0.045 45);
  --secondary: oklch(0.3 0.03 45);
  --secondary-foreground: oklch(0.95 0.018 85);
  --muted: oklch(0.28 0.025 45);
  --muted-foreground: oklch(0.7 0.025 70);
  --accent: oklch(0.32 0.04 50);
  --accent-foreground: oklch(0.95 0.018 85);
  --destructive: oklch(0.704 0.191 22.216);
  --destructive-foreground: oklch(0.984 0.003 247.858);
  --border: oklch(1 0 0 / 10%);
  --input: oklch(1 0 0 / 15%);
  --ring: oklch(0.6 0.04 70);
}

/* =====================================================================
   APPLIQUÉS — styles sémantiques
   ===================================================================== */
html { scroll-behavior: smooth; }

body {
  background-color: var(--background);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4, .font-serif {
  font-family: var(--font-serif);
  font-feature-settings: "lnum";
  font-weight: 500;
  letter-spacing: -0.01em;
}

h1 { font-size: var(--fs-display); line-height: var(--lh-display); }
h2 { font-size: var(--fs-h2);       line-height: var(--lh-h2); }
h3 { font-size: var(--fs-h3);       line-height: var(--lh-h3); }

p {
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: color-mix(in oklab, var(--foreground) 75%, transparent);
}

.eyebrow {
  font-family: var(--font-sans);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
  color: color-mix(in oklab, var(--foreground) 50%, transparent);
}

.italic-serif, em {
  font-family: var(--font-serif);
  font-style: italic;
}

blockquote {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--fs-quote);
  line-height: var(--lh-quote);
}

code, pre, .mono {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

::selection {
  background-color: var(--ink);
  color: var(--cream);
}

/* =====================================================================
   UTILITAIRES — texture & gradients signature
   ===================================================================== */
.grain-texture {
  background-image:
    radial-gradient(circle at 20% 30%, oklch(0.85 0.04 70 / 0.4) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, oklch(0.82 0.05 60 / 0.35) 0%, transparent 45%),
    radial-gradient(circle at 50% 90%, oklch(0.78 0.04 80 / 0.3) 0%, transparent 50%);
}

.gradient-ice    { background-image: linear-gradient(135deg, var(--ice-from),   var(--ice-to)); }
.gradient-ochre  { background-image: linear-gradient(135deg, var(--ochre-from), var(--ochre-to)); }
.gradient-meta   { background-image: linear-gradient(135deg, var(--meta-from),  var(--meta-to)); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

</style>
  <style>
/* UI kit styles — direct CSS recreation of Tailwind classes used in source */

* { box-sizing: border-box; }
body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
.container { max-width: 80rem; margin: 0 auto; padding: 0 24px; }
.container.narrow { max-width: 60rem; }

/* Scroll progress */
.scroll-progress { position: fixed; left: 0; right: 0; top: 0; height: 2px; background: color-mix(in oklab, var(--foreground) 80%, transparent); transform-origin: left; z-index: 60; }

/* ====== NAV ====== */
.site-nav { position: fixed; inset: 0 0 auto 0; z-index: 50; border-bottom: 1px solid transparent; transition: background 500ms var(--ease-silk), border-color 500ms var(--ease-silk), backdrop-filter 500ms var(--ease-silk); }
.site-nav.scrolled { background: color-mix(in oklab, var(--background) 80%, transparent); backdrop-filter: blur(10px); border-bottom-color: color-mix(in oklab, var(--border) 60%, transparent); }
.site-nav.on-dark .brand, .site-nav.on-dark .brand .dot { color: rgba(255,255,255,.9); }
.site-nav.on-dark .brand .dot { color: rgba(255,255,255,.5); }
.site-nav.on-dark .navlink { color: rgba(255,255,255,.6); }
.site-nav.on-dark .navlink:hover { color: #fff; }
.site-nav.on-dark .navlink::after { background: #fff; }
.site-nav.on-dark .pill-pdf { color: rgba(255,255,255,.85); border-color: rgba(255,255,255,.3); }
.site-nav.on-dark .pill-pdf:hover { background: #fff; color: oklch(0.12 0.04 255); border-color: #fff; }
.site-nav.on-dark.scrolled { background: color-mix(in oklab, oklch(0.12 0.04 255) 82%, transparent); border-bottom-color: rgba(255,255,255,.08); }
.site-nav, .site-nav .brand, .site-nav .navlink, .site-nav .pill-pdf { transition: color 500ms var(--ease-silk), background 500ms var(--ease-silk), border-color 500ms var(--ease-silk); }
.site-nav nav { max-width: 80rem; margin: 0 auto; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
.brand { font-family: var(--font-serif); font-style: italic; font-size: 20px; color: var(--foreground); text-decoration: none; }
.brand .dot { color: color-mix(in oklab, var(--foreground) 50%, transparent); }
.site-nav ul { display:flex; gap: 32px; margin: 0; padding: 0; list-style: none; align-items: center; }
.navlink { position: relative; font-size: 14px; font-weight: 500; color: color-mix(in oklab, var(--foreground) 70%, transparent); text-decoration: none; transition: color var(--dur-short); }
.navlink::after { content:""; position: absolute; left: 0; bottom: -4px; height: 1px; width: 0; background: var(--foreground); transition: width var(--dur-short) var(--ease-silk); }
.navlink:hover { color: var(--foreground); }
.navlink:hover::after { width: 100%; }
.pill-pdf { display:inline-flex; align-items:center; gap: 8px; padding: 8px 16px; border-radius: 999px; border: 1px solid color-mix(in oklab, var(--foreground) 30%, transparent); font-size: 12px; font-weight: 500; color: var(--foreground); text-decoration: none; transition: all var(--dur-mid) var(--ease-silk); }
.pill-pdf:hover { background: var(--foreground); color: var(--background); border-color: var(--foreground); }

/* ====== BUTTONS ====== */
.btn-primary { position: relative; overflow: hidden; display:inline-flex; align-items:center; gap: 12px; padding: 14px 28px; border-radius: 999px; border: 1px solid color-mix(in oklab, var(--foreground) 80%, transparent); background: var(--foreground); color: var(--background); font-family: var(--font-sans); font-size: 14px; font-weight: 500; text-decoration: none; transition: transform var(--dur-mid) var(--ease-silk), box-shadow var(--dur-mid) var(--ease-silk); cursor: pointer; }
.btn-primary:hover { transform: scale(1.02); box-shadow: 0 25px 50px -12px oklch(0 0 0 / .25); }
.btn-primary .bg-meta, .btn-primary .bg-ochre { position: absolute; inset: 0; z-index: 0; transform: translateY(100%); transition: transform var(--dur-long) var(--ease-silk); }
.btn-primary .bg-meta { background: linear-gradient(135deg, var(--meta-from), var(--meta-to)); }
.btn-primary .bg-ochre { background: linear-gradient(135deg, var(--ochre-from), var(--ochre-to)); }
.btn-primary:hover .bg-meta, .btn-primary:hover .bg-ochre { transform: translateY(0); }
.btn-primary .label, .btn-primary svg { position: relative; z-index: 1; }
.btn-primary.inverse { background: var(--background); color: var(--foreground); border-color: var(--background); }
.btn-primary.inverse:hover .label { color: var(--background); transition: color var(--dur-long); }
.btn-ghost { display:inline-flex; align-items:center; gap: 10px; padding: 14px 24px; border-radius: 999px; background: transparent; border: 1px solid color-mix(in oklab, var(--foreground) 30%, transparent); color: var(--foreground); font-family: var(--font-sans); font-size: 14px; font-weight: 500; text-decoration: none; transition: all var(--dur-mid) var(--ease-silk); cursor: pointer; }
.btn-ghost.inverse { color: var(--background); border-color: color-mix(in oklab, var(--background) 40%, transparent); }
.btn-ghost.inverse:hover { background: var(--background); color: var(--foreground); border-color: var(--background); }
.btn-link { display:inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: color-mix(in oklab, var(--foreground) 70%, transparent); text-decoration: none; text-underline-offset: 4px; transition: color var(--dur-mid); }
.btn-link:hover { color: var(--foreground); text-decoration: underline; }

/* ====== SPLASH (intro cornet 3D) ====== */
.splash { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; padding: 40px 24px; opacity: 1; transition: opacity 750ms var(--ease-silk); }
.splash--leaving { opacity: 0; }
.splash-bg { position: absolute; inset: 0; pointer-events: none; }
.splash-bg .blob { position: absolute; border-radius: 50%; filter: blur(130px); }
.splash-bg .blob--ice { left: 25%; top: 25%; width: 28rem; height: 28rem; background: oklch(0.65 0.16 245 / 0.32); animation: splash-blob-a 10s ease-in-out infinite; }
.splash-bg .blob--meta { right: 25%; bottom: 25%; width: 24rem; height: 24rem; background: oklch(0.5 0.2 305 / 0.28); animation: splash-blob-b 13s ease-in-out infinite 3s; }
@keyframes splash-blob-a { 0%,100%{ transform:scale(1); opacity:.22 } 50%{ transform:scale(1.12); opacity:.38 } }
@keyframes splash-blob-b { 0%,100%{ transform:scale(1); opacity:.15 } 50%{ transform:scale(1.16); opacity:.28 } }
.splash-bg .spotlight { position:absolute; inset:0; background: radial-gradient(ellipse 55% 55% at 50% 52%, oklch(0.65 0.16 245 / .12) 0%, transparent 70%), radial-gradient(ellipse 35% 35% at 50% 52%, oklch(1 0 0 / .04) 0%, transparent 100%); }
.splash-bg .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, oklch(0.05 0.01 45 / .85) 100%); }
.splash-top { position: relative; z-index: 10; opacity: 1; animation: splash-fade .9s .3s var(--ease-silk) both; }
.splash-kicker { font-family: var(--font-sans); font-size: 10px; letter-spacing: .35em; text-transform: uppercase; color: rgba(255,255,255,.25); }
.splash-kicker .sep { opacity: .6; margin: 0 .3em; }
.splash-center { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 24px; max-width: 56rem; width: 100%; }
.splash-quote { opacity: 1; animation: splash-fadeup 1.1s .6s var(--ease-silk) both; margin: 0; }
.splash-quote p { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: clamp(1.1rem, 2.8vw, 1.85rem); line-height: 1.6; color: rgba(255,255,255,.65); text-align: center; margin: 0; }
@media (max-width: 640px) { .hide-sm { display: none; } }
.splash-cone-wrap { position: relative; z-index: 10; width: 340px; height: 340px; opacity: 1; animation: splash-rise 1.4s .85s var(--ease-silk) both; }
@media (min-width: 768px) { .splash-cone-wrap { width: 400px; height: 400px; } }
.splash-cone-halo { position:absolute; inset:0; border-radius:50%; filter: blur(60px); background: radial-gradient(circle at 50% 60%, oklch(0.72 0.14 245 / .18), transparent 70%); transform: scale(1.3); z-index:-1; }
.icecream3d { position: absolute; inset: 0; }
.splash-bg .blob--ice { position: absolute; left: 25%; top: 25%; width: 28rem; height: 28rem; border-radius: 50%; filter: blur(130px); background: oklch(0.65 0.16 245 / 0.45); animation: splash-blob-a 10s ease-in-out infinite; }
.splash-bg .blob--meta { position: absolute; right: 25%; bottom: 25%; width: 24rem; height: 24rem; border-radius: 50%; filter: blur(120px); background: oklch(0.5 0.2 305 / 0.35); animation: splash-blob-b 13s ease-in-out infinite 3s; }
.splash-bg .blob--warm { position: absolute; right: 5%; top: 5%; width: 38rem; height: 38rem; border-radius: 50%; filter: blur(120px); background: radial-gradient(circle, oklch(0.62 0.24 35 / 0.9), oklch(0.52 0.22 20 / 0.5), transparent 72%); opacity: 0; }
.vignette-light { position: absolute; inset: 0; background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 30%, oklch(0.04 0.01 0 / 0.40) 100%); pointer-events: none; }
.splash-melted-cta { display: flex; flex-direction: column; align-items: center; gap: 16px; animation: splash-fadeup .9s var(--ease-silk) both; }
.splash-melted-label { font-family: var(--font-serif); font-style: italic; font-size: 14px; letter-spacing: .06em; color: rgba(255,255,255,.5); margin: 0; }
.splash-continue { display: inline-flex; align-items: center; gap: 12px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.35); border-radius: 999px; padding: 14px 28px; font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: rgba(255,255,255,.9); cursor: pointer; transition: all 400ms var(--ease-silk); letter-spacing: .04em; }
.splash-continue:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.7); color: #fff; transform: scale(1.03); }
.splash-continue-arrow { font-size: 16px; transition: transform 300ms; }
.splash-continue:hover .splash-continue-arrow { transform: translateX(4px); }
.splash-timer { font-family: var(--font-sans); font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.28); margin: 0; text-align: center; }
.splash-timer strong { color: rgba(255,255,255,.55); font-weight: 500; }
.splash-sun { position: absolute; left: 28px; top: 28px; pointer-events: none; z-index: 1; opacity: .85; }
.splash-bottom { position: relative; z-index: 10; opacity: 1; animation: splash-fadeup 1s 1.6s var(--ease-silk) both; }
.splash-enter { display: flex; flex-direction: column; align-items: center; gap: 12px; background: none; border: 0; cursor: pointer; color: rgba(255,255,255,.4); transition: color 300ms; padding: 8px 16px; }
.splash-enter:hover { color: rgba(255,255,255,.75); }
.splash-enter-label { font-family: var(--font-sans); font-size: 10px; letter-spacing: .3em; text-transform: uppercase; }

@keyframes splash-fade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }

@media (prefers-reduced-motion: reduce) {
  .splash-top, .splash-quote, .splash-cone-wrap, .splash-bottom { animation: none !important; opacity: 1 !important; transform: none !important; }

}

/* ====== WIND SECTION ("Le vent révèle") ====== */
.wind-section { position: relative; min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; background: oklch(0.09 0.03 255); }
.wind-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: block; }
.wind-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px 24px; gap: 32px; width: 100%; max-width: 72rem; }
.wind-counter { font-family: var(--font-sans); font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: rgba(255,255,255,.25); }
.wind-phrase-wrap { position: relative; min-height: 14rem; display: flex; align-items: center; justify-content: center; width: 100%; }
.wind-phrase { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 0 24px; }
.wind-phrase-text { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: clamp(1.6rem, 4vw, 3.2rem); line-height: 1.25; color: #fff; text-align: center; max-width: 56rem; transition: none; }
.wind-phrase-text em { font-style: normal; color: rgba(255,255,255,.5); }
.wind-phrase.is-entering .wind-phrase-text { animation: wind-in .8s var(--ease-silk) forwards; }
.wind-phrase.is-leaving .wind-phrase-text { animation: wind-out .6s var(--ease-silk) forwards; }
.wind-phrase.is-done .wind-phrase-text { opacity: 0; }

const THREE_URL = "https://unpkg.com/three@0.160.0/build/three.module.js";

const CONE_POS_Y  = -1.28;
const CONE_HEIGHT = 2.1;
const CONE_TOP_R  = 0.68;
const CONE_TOP_Y  = CONE_POS_Y + CONE_HEIGHT / 2;
const CONE_TIP_Y  = CONE_POS_Y - CONE_HEIGHT / 2;

const STREAMS = [
  { angle: 0.18,  startMelt: 0.06, yOffset: -0.10 },
  { angle: 1.10,  startMelt: 0.08, yOffset: -0.15 },
  { angle: 2.10,  startMelt: 0.09, yOffset: -0.08 },
  { angle: 3.20,  startMelt: 0.10, yOffset: -0.20 },
  { angle: 4.20,  startMelt: 0.12, yOffset: -0.12 },
  { angle: 5.20,  startMelt: 0.14, yOffset: -0.06 },
  { angle: 0.65,  startMelt: 0.20, yOffset:  0.10 },
  { angle: 3.80,  startMelt: 0.24, yOffset:  0.08 },
];

function outerRadius(y, scoopR, scoopY) {
  const dy = y - scoopY;
  const rScoop = Math.abs(dy) < scoopR ? Math.sqrt(Math.max(0, scoopR*scoopR - dy*dy)) : 0;
  const rCone  = y <= CONE_TOP_Y && y >= CONE_TIP_Y
    ? CONE_TOP_R * ((y - CONE_TIP_Y) / (CONE_TOP_Y - CONE_TIP_Y))
    : 0;
  return Math.max(rScoop, rCone, 0.01);
}

function IceCream3D({ melt }) {
  const mountRef = React.useRef(null);
  const stateRef = React.useRef({ currentMelt: 0, render: null });

  React.useEffect(() => {
    let disposed = false;
    let cleanup = null;
    const init = () => {
      const THREE = window.THREE;
      if (!THREE || disposed || !mountRef.current) return;
      const mount = mountRef.current;
      const width = mount.clientWidth || 400;
      const height = mount.clientHeight || 400;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(36, width/height, 0.1, 100);
      camera.position.set(0, 0.2, 5.8);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      mount.appendChild(renderer.domElement);
      scene.add(new THREE.AmbientLight(0xc8d8f0, 0.4));
      const dir = new THREE.DirectionalLight(0xfff8f0, 1.3); dir.position.set(3, 6, 4); scene.add(dir);
      const p1 = new THREE.PointLight(0x7aaeff, 0.5); p1.position.set(-5, 2, 1); scene.add(p1);
      const p2 = new THREE.PointLight(0xffcf90, 0.28); p2.position.set(0, -4, 3); scene.add(p2);
      const group = new THREE.Group(); scene.add(group);
      const coneGeo = new THREE.ConeGeometry(CONE_TOP_R, CONE_HEIGHT, 6);
      const coneMat = new THREE.MeshStandardMaterial({ color: 0xC49165, roughness: 0.80, metalness: 0.04 });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.rotation.x = Math.PI; cone.position.y = CONE_POS_Y; group.add(cone);
      const waffleGeo = new THREE.ConeGeometry(CONE_TOP_R + 0.014, CONE_HEIGHT + 0.02, 6);
      const waffleMat = new THREE.MeshStandardMaterial({ color: 0x8A5E28, transparent: true, opacity: 0.28, wireframe: true });
      const waffle = new THREE.Mesh(waffleGeo, waffleMat);
      waffle.rotation.x = Math.PI; waffle.position.y = CONE_POS_Y; group.add(waffle);
      const scoopGeo = new THREE.SphereGeometry(1, 40, 40);
      const scoopMat = new THREE.MeshStandardMaterial({ color: 0xEDE2CF, roughness: 0.48, metalness: 0 });
      const scoop = new THREE.Mesh(scoopGeo, scoopMat); group.add(scoop);
      // Remplissage crème à l'intérieur du cornet
      const fillMat = new THREE.MeshStandardMaterial({ color: 0xEDE2CF, roughness: 0.5, metalness: 0 });
      const fill = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.01, 16), fillMat);
      fill.visible = false; fill.position.y = CONE_TIP_Y; group.add(fill);
      const streamMat = new THREE.MeshStandardMaterial({ color: 0xEDE2CF, roughness: 0.38 });
      const streams = STREAMS.map(() => {
        const m = new THREE.Mesh(new THREE.BufferGeometry(), streamMat);
        m.visible = false; group.add(m); return m;
      });
      const mouse = { x: 0, y: 0 };
      const onMove = (e) => {
        mouse.x = (e.clientX / window.innerWidth  - 0.5) * Math.PI * 0.65;
        mouse.y = (e.clientY / window.innerHeight - 0.5) * Math.PI * 0.22;
      };
      window.addEventListener('mousemove', onMove);
      const rot = { x: 0.1, y: 0 };
      let raf = 0;
      const onResize = () => {
        const w = mount.clientWidth, h = mount.clientHeight;
        if (!w || !h) return;
        renderer.setSize(w, h);
        camera.aspect = w/h; camera.updateProjectionMatrix();
      };
      const ro = new ResizeObserver(onResize); ro.observe(mount);
      stateRef.current.render = (currentMelt) => {
        const m = Math.min(1, currentMelt);
        // Descente douce et continue — pas de squash brutal
        const scaleXZ = 0.82 * (1 + m * 0.18);          // s'élargit légèrement
        const scaleY  = 0.82 * Math.max(0.25, 1 - m * 0.60); // s'aplatit doucement
        const scoopY  = 0.2 - m * 0.62;                  // descend dans le cornet
        scoop.scale.set(scaleXZ, scaleY, scaleXZ);
        scoop.position.y = scoopY;
        scoop.visible = true; // toujours visible — c'est la crème qui reste
        scoopMat.roughness = Math.max(0.05, 0.48 - m * 0.43);
        // Remplissage crème dans le cornet (démarre tôt)
        const fp = Math.min(1, Math.max(0, (m - 0.1) / 0.9));
        if (fp > 0.01) {
          const fh = fp * CONE_HEIGHT * 0.98;
          const fTopR = CONE_TOP_R * Math.min(1, fp * 1.1) * 0.90;
          fill.geometry.dispose();
          fill.geometry = new THREE.CylinderGeometry(fTopR, 0.02, fh, 16);
          fill.position.y = CONE_TIP_Y + fh / 2;
          fill.visible = true;
        } else { fill.visible = false; }
        // Filets avec zigzag (wobble latéral)
        const effectiveR = scaleXZ;
        STREAMS.forEach((s, i) => {
          const progress = Math.max(0, (m - s.startMelt) / 0.45);
          const mesh = streams[i];
          if (progress <= 0) { mesh.visible = false; return; }
          const startY = scoopY + s.yOffset * Math.max(0.2, scaleY / 0.82);
          const flowLen = Math.min(progress, 1) * 1.8;
          const N = 32; const pts = [];
          const perpAngle = s.angle + Math.PI / 2;
          for (let k = 0; k <= N; k++) {
            const t = k / N;
            const y = startY - t * flowLen;
            const r = outerRadius(y, effectiveR, scoopY) + 0.008;
            // Zigzag sinusoïdal perpendiculaire au filet
            const wobble = 0.038 * Math.sin(t * Math.PI * 3.2 + s.angle * 1.7);
            pts.push(new THREE.Vector3(
              Math.cos(s.angle)*r + Math.cos(perpAngle)*wobble,
              y,
              Math.sin(s.angle)*r + Math.sin(perpAngle)*wobble
            ));
          }
          const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
          const tubeRadius = 0.028 + Math.min(progress,1) * 0.018; // épais et crémeux
          const tube = new THREE.TubeGeometry(curve, N, tubeRadius, 8, false);
          mesh.geometry.dispose(); mesh.geometry = tube; mesh.visible = true;
        });
      };
      const loop = () => {
        rot.y += (mouse.x - rot.y) * 0.055;
        rot.x += (mouse.y - rot.x) * 0.055;
        group.rotation.y = rot.y;
        group.rotation.x = rot.x;
        if (stateRef.current.render) stateRef.current.render(stateRef.current.currentMelt || 0);
        renderer.render(scene, camera);
        raf = requestAnimationFrame(loop);
      };
      loop();
      cleanup = () => {
        cancelAnimationFrame(raf);
        window.removeEventListener('mousemove', onMove);
        ro.disconnect();
        renderer.dispose();
        coneGeo.dispose(); coneMat.dispose();
        waffleGeo.dispose(); waffleMat.dispose();
        scoopGeo.dispose(); scoopMat.dispose();
        streamMat.dispose();
        streams.forEach(m => m.geometry && m.geometry.dispose());
        if (renderer.domElement.parentNode === mount) mount.removeChild(renderer.domElement);
      };
    };
    if (window.THREE) { init(); }
    else {
      const onReady = () => init();
      window.addEventListener('three-ready', onReady, { once: true });
      cleanup = () => window.removeEventListener('three-ready', onReady);
    }
    return () => { disposed = true; if (cleanup) cleanup(); };
  }, []);

  React.useEffect(() => {
    if (stateRef.current) stateRef.current.currentMelt = melt;
  }, [melt]);

  return <div ref={mountRef} className="icecream3d" />;
}
window.IceCream3D = IceCream3D;

function Splash({ onEnter }) {
  const [visible, setVisible] = React.useState(true);
  const [leaving, setLeaving] = React.useState(false);
  const [melt, setMelt] = React.useState(0);
  const [seconds, setSeconds] = React.useState(0);
  const meltIntervalRef = React.useRef(null);

  // Toujours afficher le splash (prototype — pas de persistance sessionStorage)
  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  // Slow melt timer
  React.useEffect(() => {
    if (!visible) return;
    meltIntervalRef.current = setInterval(() => {
      setMelt(m => Math.min(1, m + 0.0009));
    }, 100);
    return () => clearInterval(meltIntervalRef.current);
  }, [visible]);

  // Seconds counter
  React.useEffect(() => {
    if (!visible) return;
    const id = setInterval(() => setSeconds(s => s + 1), 1000);
    return () => clearInterval(id);
  }, [visible]);

  // Fast melt on enter — glace disparaît entièrement puis fade
  const enter = React.useCallback(() => {
    if (leaving) return;
    clearInterval(meltIntervalRef.current);
    try { sessionStorage.removeItem('mdg_splash_seen'); } catch {}
    let done = false;
    const fastId = setInterval(() => {
      setMelt(m => {
        const next = Math.min(1, m + 0.07);
        if (next >= 1 && !done) {
          done = true;
          clearInterval(fastId);
          // Petit temps d'attente après disparition, puis fade out
          setTimeout(() => {
            setLeaving(true);
            setTimeout(() => {
              setVisible(false);
              document.body.style.overflow = '';
              onEnter && onEnter();
            }, 950);
          }, 350);
        }
        return next;
      });
    }, 40);
  }, [leaving, onEnter]);

  // Auto-fonte à 30 secondes
  React.useEffect(() => {
    if (seconds === 30 && visible && !leaving) enter();
  }, [seconds]);

  // Touche Entrée
  React.useEffect(() => {
    if (!visible) return;
    const onKey = (e) => { if (e.key === 'Enter') enter(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [visible, enter]);

  if (!visible) return null;

  const s = seconds;
  // Fond qui passe du bleu nuit au rouge-orange au fil du melt
  const bgHue = Math.round(255 - melt * 225);
  const bgChroma = (0.02 + melt * 0.07).toFixed(3);
  const bgStyle = { backgroundColor: `oklch(0.09 ${bgChroma} ${bgHue})` };

  const timerLabel = s === 0 ? 'La glace fond…' : `La glace fond depuis ${s} seconde${s > 1 ? 's' : ''}`;

  return (
    <div className={`splash ${leaving ? 'splash--leaving' : ''}`} role="dialog" aria-label="Introduction" style={bgStyle}>
      <div className="splash-bg" aria-hidden>
        <div className="blob blob--ice" />
        <div className="blob blob--meta" />
        <div className="spotlight" />
        <div className="vignette" />
      </div>
      {/* Arrière-plan */}

      {/* En-tête */}
      <div className="splash-top">
        <span className="splash-kicker">Météorologie du goût <span className="sep">—</span> EHESS <span className="sep">·</span> 2026</span>
      </div>

      {/* Zone centrale */}
      <div className="splash-center">
        <blockquote className="splash-quote">
          <p>
            «&nbsp;La glace fond. Elle disparaît. C'est dans cet instant éphémère<br className="hide-sm"/>
            que réside toute la métaphysique du bonheur.&nbsp;»
          </p>
        </blockquote>

        <div className="splash-cone-wrap">
          <div className="splash-cone-halo" aria-hidden />
          <IceCream3D melt={melt} />
        </div>

        {/* Timer */}
        <p className="splash-timer">{timerLabel}</p>
      </div>

      {/* Bouton */}
      <div className="splash-bottom">
        <button type="button" onClick={enter} className="splash-enter">
          <span className="splash-enter-label">Entrer dans l'enquête</span>
          <span className="splash-enter-rule" aria-hidden>
            <span className="rule-line" />
            <span className="rule-arrow">↓</span>
          </span>
        </button>
      </div>
    </div>
  );
}
window.Splash = Splash;

const WIND_PHRASES = [
  {
    num: "01",
    label: "Technique",
    color: "oklch(0.65 0.16 245)",
    text: <>«&nbsp;Le froid est un <em>savoir-faire</em>.<br/>Chaque cristal, une décision.&nbsp;»</>,
  },
  {
    num: "02",
    label: "Économie",
    color: "oklch(0.78 0.1 75)",
    text: <>«&nbsp;La glace a un prix.<br/><em>Et une valeur qu'on ne mesure pas.</em>&nbsp;»</>,
  },
  {
    num: "03",
    label: "Métaphysique",
    color: "oklch(0.5 0.2 305)",
    text: <>«&nbsp;Ce qui fond sur la langue<br/>ne se raconte pas.<em> Il se ressent.</em>&nbsp;»</>,
  },
];

function WindSection() {
  const [phase, setPhase] = React.useState(-1); // -1 = not started
  const [leaving, setLeaving] = React.useState(false);
  const canvasRef = React.useRef(null);
  const sectionRef = React.useRef(null);
  const phaseRef = React.useRef(phase);
  phaseRef.current = phase;

  // Start when section enters viewport
  React.useEffect(() => {
    const el = sectionRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && phaseRef.current === -1) setPhase(0);
    }, { threshold: 0.3 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  // Wind canvas particles
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    const ro = new ResizeObserver(resize); ro.observe(canvas);

    // Particles: ice crystals drifting right
    const N = 80;
    const pts = Array.from({ length: N }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.4,
      vx: Math.random() * 0.6 + 0.2,
      vy: (Math.random() - 0.5) * 0.3,
      op: Math.random() * 0.35 + 0.05,
    }));

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 210, 255, ${p.op})`;
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x > canvas.width + 4) { p.x = -4; p.y = Math.random() * canvas.height; }
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);

  const advance = React.useCallback(() => {
    if (leaving) return;
    const cur = phaseRef.current;
    if (cur < 0 || cur >= WIND_PHRASES.length) return;
    setLeaving(true);
    setTimeout(() => {
      setLeaving(false);
      setPhase(cur + 1);
    }, 650);
  }, [leaving]);

  const isDone = phase >= WIND_PHRASES.length;

  return (
    <section ref={sectionRef} id="vent" className="wind-section" onClick={!isDone ? advance : undefined}>
      <canvas ref={canvasRef} className="wind-canvas" />
      <div className="wind-halo wind-halo--1" aria-hidden />
      <div className="wind-halo wind-halo--2" aria-hidden />

      <div className="wind-inner">
        {/* Pill indicators */}
        <div className="wind-pill-row">
          {WIND_PHRASES.map((p, i) => (
            <span key={p.num} className={`wind-pill ${i <= phase && !isDone ? 'active' : ''} ${i < phase || isDone ? 'done' : ''}`}>
              {p.num} · {p.label}
            </span>
          ))}
        </div>

        {/* Phrase display */}
        {!isDone && (
          <div className="wind-phrase-wrap">
            {phase >= 0 && (
              <div className={`wind-phrase ${leaving ? 'is-leaving' : 'is-entering'}`}>
                <p className="wind-phrase-text">{WIND_PHRASES[phase].text}</p>
              </div>
            )}
          </div>
        )}

        {/* Done state */}
        {isDone && (
          <div className="wind-done-cta">
            <h3>Trois entrées dans une même matière</h3>
            <a href="#projet">
              Découvrir les trois piliers
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            </a>
          </div>
        )}

        {/* Hint to click */}
        {!isDone && phase >= 0 && !leaving && (
          <div className="wind-hint">
            <span>Cliquer pour souffler</span>
            <span className="wind-hint-arrow">→</span>
          </div>
        )}
      </div>
    </section>
  );
}
window.WindSection = WindSection;

      React.useEffect(() => {

          const h = document.documentElement;
          const pr = h.scrollTop / (h.scrollHeight - h.clientHeight || 1);
          setP(pr);

        on(); window.addEventListener('scroll', on, {passive:true});
        return () => window.removeEventListener('scroll', on);
      }, []);
      return <div className="scroll-progress" style={{ transform: `scaleX(${p})` }} />;
    }
